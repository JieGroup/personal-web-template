name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Runs on every push to main

permissions:
  contents: write  # Needed to push to gh-pages branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Set to your repo name for GitHub Pages subpath
          # e.g. if your site is username.github.io/my-repo set to /my-repo/
          VITE_BASE_PATH: /personal-web-template/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          force_orphan: true  # Keep gh-pages branch clean (no history)
