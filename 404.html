<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Academic Personal Website</title>
  <script>
    // SPA redirect: sends path to index.html via query string
    var l = window.location;
    var base = '/personal-web-template';
    l.replace(
      l.protocol + '//' + l.host + base + '/?p=/' +
      l.pathname.slice(base.length + 1).replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
</html>
